backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: tr

collections:
  - name: "haberler"
    label: "Haberler & Açıklamalar"
    folder: "content/haberler"
    create: true
    slug: "{{slug}}"
    identifier_field: "baslik"
    fields:
      - { label: "Başlık", name: "baslik", widget: "string" }
      - { label: "Tarih", name: "tarih", widget: "datetime", format: "DD MMMM YYYY", date_format: "DD MMMM YYYY", time_format: false }
      - label: "Kategori"
        name: "kategori"
        widget: "select"
        options: ["Bildiri", "Rapor", "Savunuculuk", "Dayanışma", "İnsan Hakları", "Hukuk", "Duyuru"]
      - { label: "Özet", name: "ozet", widget: "text" }
      - { label: "İçerik", name: "body", widget: "markdown" }
      - { label: "Öne Çıkar (Ana Sayfada Büyük Göster)", name: "one_cikar", widget: "boolean", default: false }
      - { label: "Kapak Görseli", name: "gorsel", widget: "image", required: false }

  - name: "etkinlikler"
    label: "Etkinlikler & Duyurular"
    folder: "content/etkinlikler"
    create: true
    slug: "{{slug}}"
    identifier_field: "baslik"
    fields:
      - { label: "Başlık", name: "baslik", widget: "string" }
      - { label: "Tarih", name: "tarih", widget: "datetime", format: "DD MMMM YYYY", date_format: "DD MMMM YYYY", time_format: false }
      - { label: "Gün (Sayı)", name: "gun", widget: "string" }
      - { label: "Ay (Kısaltma, örn: Ara)", name: "ay", widget: "string" }
      - label: "Kategori"
        name: "kategori"
        widget: "select"
        options: ["Eğitim Programı", "Eylem", "Sempozyum", "Hukuki Süreç", "Toplantı", "Atölye"]
      - { label: "Kısa Açıklama", name: "aciklama", widget: "text" }
      - { label: "İçerik", name: "body", widget: "markdown" }
      - { label: "Konum", name: "konum", widget: "string", required: false }
      - { label: "Kayıt Linki", name: "kayit_linki", widget: "string", required: false }

  - name: "ayarlar"
    label: "Site Ayarları"
    files:
      - label: "Genel Ayarlar"
        name: "genel"
        file: "content/ayarlar.yml"
        fields:
          - { label: "Site Başlığı", name: "site_baslik", widget: "string" }
          - { label: "Kısa Açıklama", name: "site_aciklama", widget: "text" }
          - { label: "E-posta", name: "email", widget: "string" }
          - { label: "Twitter", name: "twitter", widget: "string" }
          - { label: "Facebook", name: "facebook", widget: "string" }
          - { label: "Üyelik Formu URL", name: "uyelik_url", widget: "string", required: false }
          - label: "Ticker Metinleri"
            name: "ticker"
            widget: "list"
            fields:
              - { label: "Etiket", name: "etiket", widget: "string" }
              - { label: "Metin", name: "metin", widget: "string" }
